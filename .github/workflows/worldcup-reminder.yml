name: 世界杯提醒

on:
  schedule:
    # 每 15 分钟运行一次，配合15分钟提醒窗口，确保不错过任何比赛
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 支持手动触发
    inputs:
      test_mode:
        description: '测试模式（true=发测试通知）'
        required: false
        default: 'false'
        type: string

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 运行世界杯提醒脚本
        run: node WorldCupReminder.js
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}

      - name: 运行测试模式（手动触发专用）
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode == 'true' }}
        run: echo "✅ 测试模式已触发"